name: mcp-permission-matrix-report
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run matrix and write reports
        shell: bash
        run: |
          set +e
          npx --yes github:aolingge/mcp-permission-matrix --path README.md --annotations
          status=$?
          npx --yes github:aolingge/mcp-permission-matrix --path README.md --markdown > mcp-permission-report.md
          npx --yes github:aolingge/mcp-permission-matrix --path README.md --sarif > mcp-permission-results.sarif
          cat mcp-permission-report.md >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mcp-permission-results.sarif
